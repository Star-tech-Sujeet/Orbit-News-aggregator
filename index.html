<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06060f">
<title>NewsOrbit — Circular News Aggregator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-canvas"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div id="stars"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo-group">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </div>
    <div class="logo-text">
      <h1>NewsOrbit</h1>
      <span>Live Feed</span>
    </div>
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <button class="search-btn" id="searchToggle">
        <svg id="searchIcon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <input type="text" class="search-input" id="searchInput" placeholder="Search news...">
    </div>
    <button class="auto-btn active" id="autoBtn">
      <svg id="autoIcon" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span class="auto-label">Pause</span>
    </button>
  </div>
</header>

<!-- CATEGORIES -->
<div class="categories" id="categories"></div>

<!-- ORBIT -->
<div class="orbit-container" id="orbitContainer">
  <div class="orbit-ring" id="orbitRing"></div>
  <div class="orbit-ring-inner" id="orbitRingInner"></div>
  <div id="cardsContainer"></div>
</div>

<!-- CENTER LABEL -->
<div class="center-label" id="centerLabel">
  <div class="center-cat">
    <div class="center-cat-dot" id="centerCatDot"></div>
    <span class="center-cat-label" id="centerCatLabel"></span>
  </div>
  <h2 class="center-title" id="centerTitle"></h2>
  <p class="center-hint">Click card to read</p>
</div>

<!-- POPUP OVERLAY -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box" id="popupBox">
    <!-- Image area -->
    <div class="popup-img-wrap">
      <img class="popup-img" id="popupImg" src="" alt="" draggable="false">
      <button class="popup-close" id="popupClose">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="popup-img-bookmark" id="popupImgBookmark">
        <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <span class="popup-source-badge" id="popupSource"></span>
    </div>
    <!-- Body -->
    <div class="popup-body">
      <div class="popup-category-row">
        <div class="popup-cat-badge" id="popupCatBadge">
          <div class="popup-cat-dot" id="popupCatDot"></div>
          <span id="popupCatName"></span>
        </div>
        <div class="popup-time-badge">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="popupTime"></span>
        </div>
      </div>

      <h2 class="popup-title" id="popupTitle"></h2>
      <p class="popup-desc" id="popupDesc"></p>
      <div class="popup-divider"></div>
      <p class="popup-content" id="popupContent"></p>

      <div class="popup-tags" id="popupTags"></div>

      <!-- Author -->
      <div class="popup-author-row">
        <div class="popup-avatar">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="popup-author-info">
          <div class="popup-author-name" id="popupAuthor"></div>
          <div class="popup-author-meta">
            <span>
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span id="popupReadTime"></span> read
            </span>
            <span>
              <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              <span id="popupSourceMeta"></span>
            </span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="popup-actions">
        <button class="popup-read-btn" id="popupReadBtn">
          Read Full Article
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <button class="popup-share-btn" id="popupShareBtn" title="Share">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="popup-bookmark-btn" id="popupBookmarkBtn" title="Bookmark">
          <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SCROLL HINT -->
<div class="scroll-hint" id="scrollHint">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  <span>Scroll to explore</span>
  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <span class="bottom-bar-item" id="articleCount"></span>
  <span class="bottom-bar-item" id="bookmarkCount" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    <span id="bookmarkNum">0</span> saved
  </span>
</div>

<script src="script.js" defer ></script>
</body>
</html>

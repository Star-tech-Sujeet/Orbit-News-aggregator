<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06060f">
<title>NewsOrbit — Circular News Aggregator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#06060f;color:#e2e8f0;
  -webkit-font-smoothing:antialiased;
}

/* ===== BACKGROUND ===== */
.bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(145deg,#06060f 0%,#0d0d1f 40%,#10102a 60%,#06060f 100%);
}
.bg-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);top:-200px;left:-100px;animation:orbFloat1 25s ease-in-out infinite alternate}
.bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);bottom:-150px;right:-100px;animation:orbFloat2 30s ease-in-out infinite alternate}
.bg-orb-3{width:400px;height:400px;background:radial-gradient(circle,rgba(34,211,238,.08),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbFloat3 20s ease-in-out infinite alternate}
@keyframes orbFloat1{0%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,40px) scale(1.1)}100%{transform:translate(-30px,80px) scale(.95)}}
@keyframes orbFloat2{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,-30px) scale(1.15)}100%{transform:translate(40px,-60px) scale(.9)}}
@keyframes orbFloat3{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-40%,-60%) scale(1.2)}100%{transform:translate(-60%,-40%) scale(.85)}}

.star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;z-index:0}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.6}}

.orbit-ring{position:absolute;border:1px solid rgba(99,102,241,.06);border-radius:50%;pointer-events:none;z-index:1}
.orbit-ring-inner{position:absolute;border:1px dashed rgba(139,92,246,.04);border-radius:50%;pointer-events:none;z-index:1;animation:ringPulse 8s ease-in-out infinite}
@keyframes ringPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.02)}}

/* ===== HEADER ===== */
.header{
  position:fixed;top:0;left:0;right:0;z-index:500;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(6,6,15,.92) 0%,transparent 100%);
}
.logo-group{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(99,102,241,.3);flex-shrink:0;
}
.logo-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text h1{font-size:16px;font-weight:700;letter-spacing:-.3px;color:#f8fafc;line-height:1.2}
.logo-text span{font-size:10px;color:#6366f1;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.header-controls{display:flex;align-items:center;gap:8px}

.search-wrap{position:relative;display:flex;align-items:center}
.search-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#94a3b8;z-index:2;transition:all .3s ease;
}
.search-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.search-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.search-input{
  position:absolute;left:0;top:0;width:0;padding:0;border:none;border-radius:24px;
  background:transparent;color:#e2e8f0;font-size:14px;font-family:inherit;outline:none;
  opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);height:36px;
}
.search-input.expanded{
  width:220px;padding:0 16px 0 42px;opacity:1;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(20px);
}
.search-input.expanded:focus{border-color:rgba(99,102,241,.4);box-shadow:0 0 20px rgba(99,102,241,.1)}
.search-input::placeholder{color:#64748b}

.auto-btn{
  display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:20px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);color:#94a3b8;font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:all .3s ease;white-space:nowrap;
}
.auto-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.auto-btn.active{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#818cf8}
.auto-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ===== CATEGORIES ===== */
.categories{
  position:fixed;top:66px;left:0;right:0;z-index:500;
  display:flex;justify-content:center;gap:6px;padding:4px 16px;flex-wrap:wrap;
}
.cat-pill{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;white-space:nowrap;user-select:none;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#94a3b8;display:flex;align-items:center;gap:5px;
  transition:all .3s ease;font-family:inherit;
}
.cat-pill:hover{background:rgba(255,255,255,.1);color:#e2e8f0;border-color:rgba(255,255,255,.15)}
.cat-pill.active{
  background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(139,92,246,.3));
  border-color:rgba(99,102,241,.5);color:#fff;box-shadow:0 0 20px rgba(99,102,241,.2);
}
.cat-pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ===== ORBIT ===== */
.orbit-container{position:absolute;inset:0;z-index:10;cursor:grab;touch-action:none;user-select:none}
.orbit-container.dragging{cursor:grabbing}

/* ===== NEWS CARD ===== */
.news-card{
  position:absolute;cursor:pointer;will-change:transform,opacity;
  background:rgba(255,255,255,.04);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;
  user-select:none;-webkit-user-select:none;
  transition:box-shadow .4s ease,border-color .4s ease;
}
.news-card:hover{border-color:rgba(99,102,241,.3);box-shadow:0 0 30px rgba(99,102,241,.15),0 8px 32px rgba(0,0,0,.4)}
.news-card.active-card{
  border-color:rgba(99,102,241,.5);
  box-shadow:0 0 40px rgba(99,102,241,.25),0 0 80px rgba(99,102,241,.1),0 12px 40px rgba(0,0,0,.5);
  background:rgba(255,255,255,.07);
}
.news-card.expanding {
  z-index: 1000 !important;
  transition: transform 0.5s ease, opacity 0.3s ease;
}

.news-card.fade-out {
  opacity: 0.2 !important;
}
.popup-box {
  transform-origin: center;
}
.card-img-wrap{overflow:hidden;position:relative;width:100%;height:55%}
.card-img-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(6,6,15,.9));pointer-events:none}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block}
.news-card:hover .card-img{transform:scale(1.08)}
.card-source{
  position:absolute;bottom:8px;left:8px;z-index:5;display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:10px;background:rgba(99,102,241,.15);
  color:#a5b4fc;font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
}
.card-body{padding:8px 10px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-height:0}
.card-title{font-size:11px;font-weight:600;line-height:1.3;color:#f1f5f9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin:0}
.active-card .card-title{font-size:12px}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.card-cat{display:flex;align-items:center;gap:4px}
.card-cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-cat-label{font-size:10px;color:#64748b;font-weight:500}
.card-time{font-size:10px;color:#475569}

.bookmark-btn{
  position:absolute;top:8px;right:8px;z-index:10;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#94a3b8;padding:0;
  transition:all .3s ease;
}
.bookmark-btn:hover{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.5);color:#fff;transform:scale(1.15)}
.bookmark-btn.bookmarked{background:rgba(99,102,241,.4);border-color:rgba(99,102,241,.6);color:#818cf8}
.bookmark-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bookmark-btn.bookmarked svg{fill:currentColor}

/* ===== CENTER LABEL ===== */
.center-label{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:5;pointer-events:none;max-width:280px;transition:opacity .4s ease;
}
.center-cat{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px}
.center-cat-dot{width:8px;height:8px;border-radius:50%}
.center-cat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
.center-title{font-size:14px;font-weight:600;color:rgba(248,250,252,.55);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.center-hint{font-size:11px;color:rgba(148,163,184,.35);margin-top:6px}

/* ===== POPUP OVERLAY ===== */
.popup-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);
  pointer-events:none;
  transition:all .5s cubic-bezier(.4,0,.2,1);
  display:flex;align-items:center;justify-content:center;
}
.popup-overlay.visible{
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  pointer-events:auto;
}

/* ===== POPUP BOX ===== */
.popup-box{
  width:min(520px,92vw);
  max-height:min(600px,88vh);
  border-radius:24px;overflow:hidden;
  background:rgba(15,15,35,.95);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(99,102,241,.15);
  box-shadow:
    0 0 80px rgba(99,102,241,.12),
    0 25px 80px rgba(0,0,0,.6),
    0 0 0 1px rgba(255,255,255,.03) inset;
  transform:scale(.85) translateY(30px);
  opacity:0;
  transition:all .5s cubic-bezier(.175,.885,.32,1.275);
  display:flex;flex-direction:column;
}
.popup-overlay.visible .popup-box{
  transform:scale(1) translateY(0);
  opacity:1;
}

/* Popup image */
.popup-img-wrap{
  position:relative;width:100%;height:220px;overflow:hidden;flex-shrink:0;
}
.popup-img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 8s ease;
}
.popup-overlay.visible .popup-img{
  transform:scale(1.05);
}
.popup-img-wrap::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:50%;
  background:linear-gradient(transparent,rgba(15,15,35,.98));pointer-events:none;
}

/* Popup close */
.popup-close{
  position:absolute;top:14px;right:14px;z-index:20;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  color:#cbd5e1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;transition:all .3s;
}
.popup-close:hover{background:rgba(239,68,68,.3);border-color:rgba(239,68,68,.5);color:#fff;transform:scale(1.1)}
.popup-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Popup floating bookmark on image */
.popup-img-bookmark{
  position:absolute;top:14px;left:14px;z-index:20;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  color:#94a3b8;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;transition:all .3s;
}
.popup-img-bookmark:hover{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.5);color:#fff;transform:scale(1.1)}
.popup-img-bookmark.bookmarked{background:rgba(99,102,241,.4);border-color:rgba(99,102,241,.6);color:#818cf8}
.popup-img-bookmark svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.popup-img-bookmark.bookmarked svg{fill:currentColor}

/* Popup source badge on image */
.popup-source-badge{
  position:absolute;bottom:16px;left:20px;z-index:10;
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:12px;
  background:rgba(99,102,241,.2);
  border:1px solid rgba(99,102,241,.3);
  color:#c7d2fe;font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
}

/* Popup body */
.popup-body{
  padding:24px 28px 28px;overflow-y:auto;flex:1;
}
.popup-body::-webkit-scrollbar{width:4px}
.popup-body::-webkit-scrollbar-track{background:transparent}
.popup-body::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:2px}

.popup-category-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.popup-cat-badge{
  display:flex;align-items:center;gap:5px;
  padding:4px 12px;border-radius:12px;font-size:11px;font-weight:600;
}
.popup-cat-dot{width:8px;height:8px;border-radius:50%}
.popup-time-badge{
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:#64748b;font-weight:500;
}
.popup-time-badge svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.popup-title{
  font-size:22px;font-weight:800;line-height:1.3;
  color:#f8fafc;margin-bottom:6px;
  letter-spacing:-.3px;
}
.popup-desc{
  font-size:14px;line-height:1.5;color:#a5b4fc;
  margin-bottom:16px;font-weight:500;font-style:italic;
}
.popup-divider{
  width:60px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  margin-bottom:16px;
}
.popup-content{
  font-size:14px;line-height:1.75;color:#94a3b8;
  margin-bottom:24px;
}

/* Author row */
.popup-author-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:14px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  margin-bottom:20px;
}
.popup-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.popup-avatar svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.popup-author-info{flex:1}
.popup-author-name{font-size:14px;font-weight:600;color:#e2e8f0}
.popup-author-meta{font-size:12px;color:#64748b;margin-top:2px;display:flex;align-items:center;gap:8px}
.popup-author-meta span{display:flex;align-items:center;gap:3px}
.popup-author-meta svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Action buttons */
.popup-actions{display:flex;gap:10px}
.popup-read-btn{
  flex:1;padding:14px 20px;border-radius:14px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:inherit;transition:all .3s;letter-spacing:.2px;
  box-shadow:0 4px 15px rgba(99,102,241,.3);
}
.popup-read-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(99,102,241,.45);
}
.popup-read-btn:active{transform:translateY(0)}
.popup-read-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.popup-share-btn{
  width:48px;height:48px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:#94a3b8;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;transition:all .3s;flex-shrink:0;
}
.popup-share-btn:hover{background:rgba(255,255,255,.12);color:#fff;transform:translateY(-2px)}
.popup-share-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.popup-bookmark-btn{
  width:48px;height:48px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:#94a3b8;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;transition:all .3s;flex-shrink:0;
}
.popup-bookmark-btn:hover{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#fff;transform:translateY(-2px)}
.popup-bookmark-btn.bookmarked{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);color:#818cf8}
.popup-bookmark-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.popup-bookmark-btn.bookmarked svg{fill:currentColor}

/* Tags */
.popup-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.popup-tag{
  padding:4px 10px;border-radius:8px;font-size:11px;font-weight:500;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  color:#64748b;
}

/* ===== SCROLL HINT ===== */
.scroll-hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:14px;
  color:#475569;font-size:12px;font-weight:500;z-index:10;
  pointer-events:none;animation:hintPulse 3s ease-in-out infinite;
}
@keyframes hintPulse{0%,100%{opacity:.4}50%{opacity:.8}}
.scroll-hint svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.bottom-bar{
  position:fixed;bottom:14px;right:20px;z-index:500;
  display:flex;align-items:center;gap:14px;font-size:11px;color:#475569;
}
.bottom-bar-item{display:flex;align-items:center;gap:4px}
.bottom-bar-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.empty-state{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;color:#64748b;z-index:100}
.empty-state svg{width:48px;height:48px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin-bottom:16px;opacity:.3}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .header{padding:12px 14px}
  .categories{top:62px;gap:4px;padding:4px 10px}
  .cat-pill{padding:5px 10px;font-size:11px}
  .auto-btn .auto-label{display:none}
  .search-input.expanded{width:160px}
  .popup-box{border-radius:20px}
  .popup-img-wrap{height:180px}
  .popup-body{padding:20px}
  .popup-title{font-size:18px}
  .popup-content{font-size:13px}
  .popup-author-row{padding:10px 12px}
  .center-title{font-size:13px}
  .logo-text h1{font-size:14px}
}
@media(max-width:400px){
  .cat-pill svg{display:none}
  .popup-img-wrap{height:150px}
  .popup-title{font-size:16px}
}
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
<div id="stars"></div>

<!-- HEADER -->
<header class="header">
  <div class="logo-group">
    <div class="logo-icon">

// ============================================================
// STATE
// ============================================================
let rotation = 0, velocity = 0, targetRotation = null;
let isDragging = false, lastPointer = {x:0,y:0,time:0};

let activeCategory = 'All', searchQuery = '', searchExpanded = false;
let bookmarks = new Set(), hasInteracted = false;
let filteredNews = [...NEWS_DATA], activeIndex = 0, cardElements = [];

const FRICTION=0.955, WHEEL_SENS=0.00035, DRAG_SENS=0.003;
const AUTO_SPEED=0.004, MIN_VEL=0.00008, LERP=0.08;

const orbitContainer=$('orbitContainer'), cardsContainer=$('cardsContainer');

// ============================================================
// DIMENSIONS
// ============================================================
function getOrbitDims(){
  const w=window.innerWidth;
  if(w<500)return{rx:140,ry:90,cw:148,ch:108};
  if(w<768)return{rx:195,ry:110,cw:170,ch:122};
  if(w<1024)return{rx:275,ry:140,cw:200,ch:145};
  if(w<1400)return{rx:355,ry:168,cw:225,ch:162};
  return{rx:415,ry:188,cw:245,ch:172};
}
let dims=getOrbitDims();
function getCenterXY(){return{cx:window.innerWidth/2,cy:window.innerHeight/2+20}}

// ============================================================
// STARS
// ============================================================
function createStars(){
  const el=$('stars'); el.innerHTML='';
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2+1;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;opacity:${Math.random()*.4+.1};animation:twinkle ${Math.random()*4+3}s ease-in-out ${Math.random()*5}s infinite`;
    el.appendChild(s);
  }
}

// ============================================================
// CATEGORIES
// ============================================================
function renderCategories(){
  categoriesEl.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-pill'+(activeCategory===cat?' active':'');
    btn.innerHTML=`${CAT_ICONS[cat]||''}<span>${cat}</span>`;
    btn.addEventListener('click',()=>{
      activeCategory=cat; searchQuery=''; searchInput.value='';
      filterNews(); renderCategories(); closePopup();
      rotation=0; velocity=0; targetRotation=null;
    });
    categoriesEl.appendChild(btn);
  });
}

// ============================================================
// FILTER
// ============================================================
function filterNews(){
  filteredNews=NEWS_DATA.filter(item=>{
    const mc=activeCategory==='All'||item.category===activeCategory;
    const ms=!searchQuery||item.title.toLowerCase().includes(searchQuery.toLowerCase())||item.description.toLowerCase().includes(searchQuery.toLowerCase());
    return mc&&ms;
  });
  renderCards(); updateBottomBar();
}

// ============================================================
// RENDER CARDS
// ============================================================
function renderCards(){
  cardsContainer.innerHTML=''; cardElements=[];
  if(filteredNews.length===0){
    cardsContainer.innerHTML=`<div class="empty-state">${SVG.search}<p style="font-size:18px;font-weight:600">No articles found</p><p style="font-size:14px;margin-top:8px;opacity:.6">Try adjusting your search or category</p></div>`;
    centerLabel.style.opacity='0'; return;
  }
  filteredNews.forEach((item,i)=>{
    const card=document.createElement('div');
    card.className='news-card'; card.dataset.index=i; card.dataset.id=item.id;
    const cc=CAT_COLORS[item.category]||'#6366f1';
    const ib=bookmarks.has(item.id);
    card.innerHTML=`
      <button class="bookmark-btn${ib?' bookmarked':''}" data-id="${item.id}">${SVG.bookmark}</button>
      <div class="card-img-wrap">
        <img class="card-img" src="${item.image}" alt="${item.title}" loading="lazy" draggable="false">
        <span class="card-source">${item.source}</span>
      </div>
      <div class="card-body">
        <h3 class="card-title">${item.title}</h3>
        <div class="card-meta">
          <div class="card-cat"><div class="card-cat-dot" style="background:${cc}"></div><span class="card-cat-label">${item.category}</span></div>
          <span class="card-time">${item.time}</span>
        </div>
      </div>`;
    card.addEventListener('click',e=>{if(e.target.closest('.bookmark-btn'))return;onCardClick(i)});
    card.querySelector('.bookmark-btn').addEventListener('click',e=>{e.stopPropagation();toggleBookmark(item.id)});
    cardsContainer.appendChild(card); cardElements.push(card);
  });
}

// ============================================================
// POSITIONING
// ============================================================
function getCardPos(index,total,rot){
  const angle=(index/total)*Math.PI*2+rot;
  const x=Math.sin(angle)*dims.rx, y=-Math.cos(angle)*dims.ry;
  const depth=-Math.cos(angle), nd=(depth+1)/2;
  return{x,y,scale:.45+nd*.65,opacity:.15+nd*.85,zIndex:Math.round(nd*100),blur:Math.max(0,(1-nd)*3),depth,angle};
}
function getActiveIdx(rot,total){
  if(!total)return -1;
  let best=0,bestD=Infinity;
  for(let i=0;i<total;i++){
    const a=(i/total)*Math.PI*2+rot;
    const n=((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    const d=Math.min(Math.abs(n-Math.PI),Math.PI*2-Math.abs(n-Math.PI));
    if(d<bestD){bestD=d;best=i}
  }
  return best;
}
function getTargetRot(idx,total,cur){
  const base=Math.PI-(idx/total)*Math.PI*2;
  const diff=base-cur;
  const nd=((diff+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI;
  return cur+nd;
}

// ============================================================
// UPDATE LOOP
// ============================================================
function updatePositions(){
  const{cx,cy}=getCenterXY(); const total=filteredNews.length;
  if(!total)return;
  activeIndex=getActiveIdx(rotation,total);
  cardElements.forEach((card,i)=>{
    const p=getCardPos(i,total,rotation);
    const tx=p.x+cx-dims.cw/2, ty=p.y+cy-dims.ch/2;
    card.style.transform=`translate(${tx}px,${ty}px) scale(${p.scale})`;
    card.style.opacity=p.opacity; card.style.zIndex=p.zIndex;
    card.style.filter=p.blur>.5?`blur(${p.blur}px)`:'none';
    card.style.width=dims.cw+'px'; card.style.height=dims.ch+'px';
    i===activeIndex?card.classList.add('active-card'):card.classList.remove('active-card');
  });
  orbitRing.style.cssText=`width:${dims.rx*2}px;height:${dims.ry*2}px;left:${cx-dims.rx}px;top:${cy-dims.ry}px`;
  orbitRingInner.style.cssText=`width:${dims.rx*2-60}px;height:${dims.ry*2-30}px;left:${cx-dims.rx+30}px;top:${cy-dims.ry+15}px`;
  if(!showDetail&&filteredNews[activeIndex]){
    const item=filteredNews[activeIndex]; const cc=CAT_COLORS[item.category]||'#6366f1';
    centerCatDot.style.background=cc; centerCatDot.style.boxShadow=`0 0 10px ${cc}`;
    centerCatLabel.style.color=cc; centerCatLabel.textContent=item.category;
    centerTitle.textContent=item.title; centerLabel.style.opacity='1';
  }else{centerLabel.style.opacity='0'}
}

let lastTime=performance.now();
function tick(now){
  const dt=Math.min((now-lastTime)/16.667,3); lastTime=now;
  if(targetRotation!==null){
    const diff=targetRotation-rotation;
    if(Math.abs(diff)<.005){rotation=targetRotation;targetRotation=null;velocity=0}
    else{rotation+=diff*LERP*dt;velocity=0}
  }else{
    if(autoRotate&&!isDragging&&!showDetail){velocity+=AUTO_SPEED*.02*dt;if(velocity>AUTO_SPEED)velocity=AUTO_SPEED}
    velocity*=Math.pow(FRICTION,dt);
    if(Math.abs(velocity)<MIN_VEL)velocity=0;
    rotation+=velocity*dt;
  }
  updatePositions();
  requestAnimationFrame(tick);
}

// ============================================================
// CARD CLICK → POPUP
// ============================================================
function onCardClick(idx){
  if(!filteredNews.length)return;

  const clickedCard = cardElements[idx];

  // Fade other cards
  cardElements.forEach((card,i)=>{
    if(i !== idx){
      card.classList.add('fade-out');
    }
  });

  // Add expand effect
  clickedCard.classList.add('expanding');

  // Move to center
  const {cx, cy} = getCenterXY();
  clickedCard.style.transform = `
    translate(${cx - dims.cw/2}px, ${cy - dims.ch/2}px)
    scale(1.8)
  `;

  // After animation → open popup
  setTimeout(()=>{
    const item = filteredNews[idx];
    detailItemId = item.id;
    openPopup(item);

    // Reset cards after popup opens
    cardElements.forEach(card=>{
      card.classList.remove('fade-out','expanding');
    });

  }, 400);
}

// ============================================================
// POPUP
// ============================================================
function openPopup(item){
  showDetail=true;
  const cc=CAT_COLORS[item.category]||'#6366f1';

  popupImg.src=item.image;
  popupImg.alt=item.title;
  popupSource.textContent=item.source;
  popupCatDot.style.background=cc;
  popupCatBadge.style.background=`${cc}15`;
  popupCatBadge.style.border=`1px solid ${cc}30`;
  popupCatName.style.color=cc;
  popupCatName.textContent=item.category;
  popupTime.textContent=item.time;
  popupTitle.textContent=item.title;
  popupDesc.textContent=item.description;
  popupContent.textContent=item.content;
  popupAuthor.textContent=item.author;
  popupReadTime.textContent=item.readTime;
  popupSourceMeta.textContent=item.source;

  // Tags
  popupTags.innerHTML='';
  if(item.tags){
    item.tags.forEach(t=>{
      const tag=document.createElement('span');
      tag.className='popup-tag'; tag.textContent='#'+t;
      popupTags.appendChild(tag);
    });
  }

  updatePopupBookmarks();
  popupOverlay.classList.add('visible');

  // Reset scroll
  const body=popupBox.querySelector('.popup-body');
  if(body) body.scrollTop=0;

  // Reset image zoom
  popupImg.style.transform='scale(1)';
  requestAnimationFrame(()=>{popupImg.style.transform='scale(1.05)'});
}

function closePopup(){
  showDetail=false;
  popupOverlay.classList.remove('visible');
  detailItemId=null;
}

function updatePopupBookmarks(){
  const ib=detailItemId&&bookmarks.has(detailItemId);
  [popupImgBookmark,popupBookmarkBtn].forEach(btn=>{
    ib?btn.classList.add('bookmarked'):btn.classList.remove('bookmarked');
  });
}

popupClose.addEventListener('click',e=>{e.stopPropagation();closePopup()});

popupOverlay.addEventListener('click',e=>{
  if(e.target===popupOverlay) closePopup();
});

popupImgBookmark.addEventListener('click',e=>{
  e.stopPropagation();
  if(detailItemId){toggleBookmark(detailItemId);updatePopupBookmarks()}
});

popupBookmarkBtn.addEventListener('click',e=>{
  e.stopPropagation();
  if(detailItemId){toggleBookmark(detailItemId);updatePopupBookmarks()}
});

// Stop propagation on popup box
popupBox.addEventListener('pointerdown',e=>e.stopPropagation());
popupBox.addEventListener('wheel',e=>e.stopPropagation(),{passive:true});

// ============================================================
// BOOKMARKS
// ============================================================
function toggleBookmark(id){
  bookmarks.has(id)?bookmarks.delete(id):bookmarks.add(id);
  updateBookmarkUI(id); updateBottomBar();
}
function updateBookmarkUI(id){
  const btn=cardsContainer.querySelector(`.bookmark-btn[data-id="${id}"]`);
  if(btn){bookmarks.has(id)?btn.classList.add('bookmarked'):btn.classList.remove('bookmarked')}
}
function updateBottomBar(){
  articleCount.textContent=`${filteredNews.length} article${filteredNews.length!==1?'s':''}`;
  if(bookmarks.size>0){bookmarkCount.style.display='flex';bookmarkNum.textContent=bookmarks.size}
  else{bookmarkCount.style.display='none'}
}

// ============================================================
// SEARCH
// ============================================================
searchToggle.addEventListener('click',()=>{
  searchExpanded=!searchExpanded;
  if(searchExpanded){
    searchInput.classList.add('expanded');
    searchIcon.innerHTML='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    setTimeout(()=>searchInput.focus(),150);
  }else{
    searchInput.classList.remove('expanded');
    searchIcon.innerHTML='<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>';
    searchQuery=''; searchInput.value=''; filterNews();
    rotation=0; velocity=0; targetRotation=null;
  }
});
searchInput.addEventListener('input',()=>{
  searchQuery=searchInput.value; filterNews();
  rotation=0; velocity=0; targetRotation=null; closePopup();
});
searchInput.addEventListener('pointerdown',e=>e.stopPropagation());

// ============================================================
// AUTO-ROTATE
// ============================================================
autoBtn.addEventListener('click',()=>{
  autoRotate=!autoRotate;
  if(autoRotate){
    autoBtn.classList.add('active');
    autoIcon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    autoBtn.querySelector('.auto-label').textContent='Pause';
  }else{
    autoBtn.classList.remove('active');
    autoIcon.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
    autoBtn.querySelector('.auto-label').textContent='Auto';
  }
});

// ============================================================
// ORBIT EVENTS
// ============================================================
orbitContainer.addEventListener('wheel',e=>{
  e.preventDefault();
  hasInteracted=true; scrollHint.style.display='none';
  targetRotation=null;
  if(showDetail)closePopup();
  velocity+=e.deltaY*WHEEL_SENS;
},{passive:false});

orbitContainer.addEventListener('pointerdown',e=>{
  if(e.target.closest('.bookmark-btn')||e.target.closest('.popup-overlay'))return;
  isDragging=true; hasInteracted=true; scrollHint.style.display='none';
  targetRotation=null; velocity=0;
  lastPointer={x:e.clientX,y:e.clientY,time:performance.now()};
  orbitContainer.classList.add('dragging');
  orbitContainer.setPointerCapture(e.pointerId);
});

orbitContainer.addEventListener('pointermove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-lastPointer.x;
  const now=performance.now();
  const dt=Math.max(now-lastPointer.time,1);
  rotation+=dx*DRAG_SENS*.05;
  velocity=(dx*DRAG_SENS*.05)/(dt/16.667);
  lastPointer={x:e.clientX,y:e.clientY,time:now};
});

function onPointerUp(){isDragging=false;orbitContainer.classList.remove('dragging')}
orbitContainer.addEventListener('pointerup',onPointerUp);
orbitContainer.addEventListener('pointercancel',onPointerUp);

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(showDetail)closePopup();
    if(searchExpanded){
      searchExpanded=false;searchInput.classList.remove('expanded');
      searchIcon.innerHTML='<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>';
      searchQuery='';searchInput.value='';filterNews();
    }
  }
  if(document.activeElement===searchInput)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){
    hasInteracted=true;scrollHint.style.display='none';
    targetRotation=null;closePopup();velocity+=.02;
  }
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){
    hasInteracted=true;scrollHint.style.display='none';
    targetRotation=null;closePopup();velocity-=.02;
  }
  if(e.key==='Enter'&&filteredNews.length>0&&!showDetail) onCardClick(activeIndex);
});

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize',()=>{dims=getOrbitDims();updatePositions()});

// ============================================================
// INIT
// ============================================================
createStars();
renderCategories();
filterNews();
updatePositions();
requestAnimationFrame(tick);
</script>
</body>
</html>
